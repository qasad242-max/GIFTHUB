<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifts Hub | Premium Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --primary-black: #1a1a1a; --accent-green: #25D366; --bg-light: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-light); }
        .navbar { background: var(--primary-black); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .product-card { background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; }
        
        /* Swiper Slider Styles */
        .swiper { width: 100%; height: 350px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        .swiper-pagination-bullet-active { background: var(--primary-black) !important; }

        .product-info { padding: 20px; }
        .price-container { display: flex; align-items: baseline; gap: 10px; margin: 10px 0; }
        .sale-price { font-size: 1.5rem; font-weight: 700; }
        .mrp-price { color: #aaa; text-decoration: line-through; }
        .btn-order { background: var(--primary-black); color: white; padding: 15px; border: none; border-radius: 12px; width: 100%; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Modals... (Same as before) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-content { background: #fff; width: 90%; max-width: 400px; margin: 50px auto; padding: 30px; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="navbar"><h1>GIFTS HUB 🎁</h1></div>

    <div class="container">
        <div class="product-grid" id="container"></div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center">Checkout Details</h2>
            <p id="selectedItem" style="text-align:center; background:#eee; padding:10px; border-radius:10px;"></p>
            <input type="text" id="custName" placeholder="Full Name">
            <input type="text" id="custAddress" placeholder="Full Address">
            <button class="btn-order" style="background:var(--accent-green)" onclick="sendToWhatsApp()">ORDER VIA WHATSAPP</button>
            <button onclick="document.getElementById('orderModal').style.display='none'" style="width:100%; background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">CLOSE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVd8VD0Gcf0skKGbowuxsPstEy0_3hUCg",
            databaseURL: "https://ruble-452dc-default-rtdb.firebaseio.com",
            projectId: "ruble-452dc",
            appId: "1:533381698939:web:e2ea188d3b18f03fd319de"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'products'), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('container');
            container.innerHTML = '';
            
            for (let id in data) {
                const p = data[id];
                // Images ko split karke array banayein (Comma separated links)
                const imgArray = p.image.split(','); 
                let slides = '';
                imgArray.forEach(url => {
                    slides += `<div class="swiper-slide"><img src="${url.trim()}"></div>`;
                });

                container.innerHTML += `
                    <div class="product-card">
                        <div class="swiper mySwiper">
                            <div class="swiper-wrapper">${slides}</div>
                            <div class="swiper-pagination"></div>
                        </div>
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <div class="price-container">
                                <span class="sale-price">₹${p.price}</span>
                                <span class="mrp-price">₹${p.mrp}</span>
                            </div>
                            <button class="btn-order" onclick="openOrder('${p.name}', '${p.price}')">
                                <i class="fa fa-shopping-bag"></i> SHOP NOW (COD)
                            </button>
                        </div>
                    </div>`;
            }
            // Initialize Swiper after loading products
            new Swiper(".mySwiper", { pagination: { el: ".swiper-pagination", clickable: true } });
        });

        window.openOrder = (n, p) => {
            window.currentItem = n; window.currentPrice = p;
            document.getElementById('selectedItem').innerText = n + " - ₹" + p;
            document.getElementById('orderModal').style.display = 'block';
        }

        window.sendToWhatsApp = () => {
            const n = document.getElementById('custName').value, a = document.getElementById('custAddress').value;
            if(!n || !a) return alert("Fill details!");
            const msg = `*NEW ORDER (GIFTS HUB)*%0A*Item:* ${window.currentItem}%0A*Price:* ₹${window.currentPrice}%0A*Name:* ${n}%0A*Address:* ${a}`;
            window.open(`https://wa.me/916263105150?text=${msg}`);
        }
    </script>
</body>
</html>
